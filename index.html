<!DOCTYPE html>
<html>
<head>
    <title>Medical Portfolio | Interactive Visualizer</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        /* ISSUE 2: Gray to Black Falloff */
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; 
               background: radial-gradient(circle, #2c2c2e 0%, #000000 100%); }
        canvas { width: 100%; height: 100%; outline: none; background: transparent; }
        
        #ui-overlay { position: absolute; top: 20px; right: 20px; width: 280px; 
                      background: rgba(15,15,15,0.9); padding: 20px; color: white; 
                      border-radius: 12px; border: 1px solid #444; backdrop-filter: blur(5px); }
        
        /* ISSUE 5: Model Info Panel */
        #info-panel { position: absolute; bottom: 20px; left: 20px; 
                      background: rgba(0,0,0,0.7); padding: 15px; color: #aaa; 
                      font-size: 11px; border-left: 3px solid #ff4d4d; }
        
        .control-group { margin-bottom: 15px; }
        input[type=range] { width: 100%; accent-color: #ff4d4d; cursor: pointer; }
        button { width: 100%; padding: 8px; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="info-panel">
        <strong>MODEL SPECS:</strong><br>
        • Poly Count: ~45k Triangles<br>
        • Maps: 2k PBR (Albedo, Rough, Normal, Emissive)<br>
        • Tech: glTF 2.0 / Draco Compression<br>
        • Extensions: KHR_materials_transmission
    </div>

    <div id="ui-overlay">
        <div class="control-group">
            <strong>CORTISOL LEVEL (STRESS)</strong>
            <input type="range" id="stressSlider" min="0" max="1" step="0.01" value="0">
        </div>

        <div class="control-group">
            <strong>LIGHTING MODE</strong>
            <button id="lightToggle">Switch to Studio Light</button>
        </div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0, 0, 0, 0); // Transparent so CSS gradient shows

            // ISSUE 8: Camera Closeness
            const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI/2, Math.PI/2.2, 2.0, new BABYLON.Vector3(0, 0.4, 0), scene);
            camera.attachControl(canvas, true);
            camera.lowerRadiusLimit = 0.3; // Can almost touch the mesh
            camera.upperRadiusLimit = 5.0;
            camera.wheelPrecision = 100; // Smoother zoom

            // ISSUE 7: Fixed Punctual Light
            const amygdalaLight = new BABYLON.PointLight("amygdalaLight", new BABYLON.Vector3(0, 0.65, 0.05), scene);
            amygdalaLight.intensity = 0.01;
            amygdalaLight.range = 0.3; 
            amygdalaLight.falloffType = BABYLON.Light.FALLOFF_PHYSICAL; 

            // Default Scene Lighting
            const env = scene.createDefaultEnvironment({ createGround: false, createSkybox: false });
            env.setMainColor(BABYLON.Color3.FromHexString("#111111"));

            BABYLON.SceneLoader.ImportMesh("", "./models/", "human_stress_v01.glb", scene, function (meshes, ps, sk, animGroups) {
                
                // ISSUE 1: Less Glossy Body
                const body = scene.getMeshByName("mesh_body");
                if(body) {
                    const glass = new BABYLON.PBRMaterial("glassMat", scene);
                    glass.alpha = 0.1;
                    glass.roughness = 0.6; // Higher number = LESS glossy/more matte
                    glass.transmission = 1.0;
                    glass.indexOfRefraction = 1.1; 
                    body.material = glass;
                }

                const heart = scene.getMeshByName("mesh_heart");
                const vagus = scene.getMeshByName("mesh_vagus");
                const slider = document.getElementById("stressSlider");

                scene.onBeforeRenderObservable.add(() => {
                    const val = parseFloat(slider.value);

                    // ISSUE 4: Animation Speed & Color
                    animGroups.forEach(group => {
                        group.speedRatio = 1.0 + (val * 2.5); // Fastens up the heart/lungs
                    });

                    // ISSUE 7: Color Change Logic
                    amygdalaLight.diffuse = BABYLON.Color3.Lerp(
                        new BABYLON.Color3(0.1, 0.3, 1.0), // Calm Blue
                        new BABYLON.Color3(1.0, 0.1, 0.1), // Stress Red
                        val
                    );
                    amygdalaLight.intensity = 0.01 + (val * 0.5);

                    // ISSUE 3: Vagus Movement Sync (The Fix)
                    if(heart && vagus && heart.morphTargetManager && vagus.morphTargetManager) {
                        // We use the influence of the heartbeat to drive the nerve
                        const heartPulse = heart.morphTargetManager.getTarget(0).influence;
                        vagus.morphTargetManager.getTarget(0).influence = heartPulse;
                        
                        // Apply color to the nerve mesh too
                        if(vagus.material) {
                            vagus.material.emissiveColor = amygdalaLight.diffuse;
                            vagus.material.emissiveIntensity = val * 5;
                        }
                    }
                });

                // ISSUE 6: Light Toggle Logic
                let studioMode = false;
                document.getElementById("lightToggle").onclick = () => {
                    studioMode = !studioMode;
                    if(studioMode) {
                        scene.lights.forEach(l => l.intensity *= 5);
                        document.getElementById("lightToggle").innerText = "Switch to Default Light";
                    } else {
                        scene.lights.forEach(l => l.intensity /= 5);
                        document.getElementById("lightToggle").innerText = "Switch to Studio Light";
                    }
                };
            });

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
