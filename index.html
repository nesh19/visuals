<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medical Portfolio | Interactive Viewer</title>
    
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background: #111; overflow: hidden; font-family: sans-serif; color: white; }
        
        babylon { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        
        #ui-panel { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(20, 20, 20, 0.9); padding: 20px; border-radius: 10px; 
            border: 1px solid #555; width: 300px; text-align: center; z-index: 100;
        }
        input[type=range] { width: 100%; margin-top: 10px; cursor: pointer; accent-color: #ff4d4d; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <strong>CORTISOL / STRESS LEVEL</strong>
        <input type="range" id="stressSlider" min="0" max="1" step="0.01" value="0">
    </div>

    <babylon id="myViewer" model="./models/human_stress_v01.glb" extends="minimal"></babylon>

    <script>
        BabylonViewer.viewerManager.getViewerPromiseById('myViewer').then(function(viewer) {
            
            viewer.onModelLoadedObservable.add(function(model) {
                const scene = viewer.sceneManager.scene;
                
                const heart = scene.getMeshByName("mesh_heart");
                const vagus = scene.getMeshByName("mesh_vagus");
                const slider = document.getElementById("stressSlider");

                // Start animations (heart and lungs)
                scene.animationGroups.forEach(anim => {
                    anim.play(true); 
                });

                scene.onBeforeRenderObservable.add(() => {
                    const stressLevel = parseFloat(slider.value);

                    // 1. Sync Vagus Nerve movement to Heartbeat
                    if(heart && vagus && heart.morphTargetManager && vagus.morphTargetManager) {
                        const heartPulse = heart.morphTargetManager.getTarget(0).influence;
                        vagus.morphTargetManager.getTarget(0).influence = heartPulse;
                    }

                    // 2. Vagus Color Change (The Bulletproof Math Bypass)
                    if(vagus && vagus.material && vagus.material.emissiveColor) {
                        // Manually shifting RGB values from Calm Blue to Stress Red
                        vagus.material.emissiveColor.r = 0.1 + (0.9 * stressLevel);
                        vagus.material.emissiveColor.g = 0.4 - (0.4 * stressLevel);
                        vagus.material.emissiveColor.b = 1.0 - (1.0 * stressLevel);
                        
                        vagus.material.emissiveIntensity = stressLevel * 5; 
                    }
                    
                    // 3. Animation Speed increases with stress
                    scene.animationGroups.forEach(anim => {
                        anim.speedRatio = 1.0 + (stressLevel * 2.5);
                    });
                });
            });
        });
    </script>
</body>
</html>
